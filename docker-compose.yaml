services:
  whatsapp-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "127.0.0.1:8180:8080"
    volumes:
      - ./store:/app/whatsapp-bridge/store
    environment:
      - TZ=UTC
      - API_KEY=${API_KEY:?API_KEY is required - see .env.example}
      - DISABLE_AUTH_CHECK=${DISABLE_AUTH_CHECK:-false}
      - API_BIND_HOST=0.0.0.0  # Docker: accept from internal network; external port is already bound to 127.0.0.1:8180
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - whatsapp_internal

  whatsapp-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    ports:
      - "127.0.0.1:8081:8081"  # MCP server (localhost only)
    volumes:
      - ./store:/app/store
    environment:
      - TZ=UTC
      - DEBUG=true
      - MCP_TRANSPORT=streamable-http
      - HOST=0.0.0.0
      - PORT=8081
      - WHATSAPP_MCP_TOOLSETS=${WHATSAPP_MCP_TOOLSETS:-all}
      - BRIDGE_HOST=whatsapp-bridge
      - API_KEY=${API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 8081), timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      whatsapp-bridge:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - whatsapp_internal

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile.web-ui
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.5'
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      whatsapp-bridge:
        condition: service_started  # not service_healthy: web-ui must start to show QR when bridge needs pairing
    restart: unless-stopped
    networks:
      - whatsapp_internal

networks:
  whatsapp_internal:
    driver: bridge
